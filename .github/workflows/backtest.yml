name: backtest

# Backtest historique a la demande (workflow_dispatch uniquement, pas de cron).
# Rejoue l'historique Hyperliquid et ecrit docs/backtest.html.

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: backtest
  cancel-in-progress: false

jobs:
  bt:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Backtest historique (fetch HL + replay)
        run: python backtest.py
      - name: Committer le rapport
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Rien a committer."
          else
            git commit -m "backtest $(date -u +%FT%TZ)"
            git pull --rebase --autostash || true
            git push
          fi
