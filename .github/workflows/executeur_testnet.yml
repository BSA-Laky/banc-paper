name: executeur-testnet

# Miroir TESTNET des bots selecteurs (argent FICTIF). Eprouve execution reelle + frais
# + gestion d'enveloppe, SANS toucher la mesure d'edge (paper). Ne touche JAMAIS le mainnet
# (execution_hl refuse si HL_NET != testnet ici). Secrets : HL_API_KEY + HL_ACCOUNT_ADDRESS.
on:
  workflow_dispatch: {}   # 17/07 : cron transfere dans station.yml (consolidation anti-famine, audit 17/07)

permissions:
  contents: write

concurrency:
  group: executeur-testnet
  cancel-in-progress: false

jobs:
  executer:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installer le SDK Hyperliquid
        run: pip install hyperliquid-python-sdk eth-account
      - name: Miroir testnet des selecteurs
        env:
          HL_MODE: live
          HL_LIVE_CONFIRM: OUI_ARGENT_REEL
          HL_NET: testnet
          HL_MAX_NOTIONAL: "150"
          HL_API_KEY: ${{ secrets.HL_API_KEY }}
          HL_ACCOUNT_ADDRESS: ${{ secrets.HL_ACCOUNT_ADDRESS }}
        run: python executeur_testnet.py
      - name: Committer l'etat testnet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "Rien a committer.";
          else git commit -m "testnet $(date -u +%FT%H:%M)"; git pull --rebase --autostash || true; git push || (git pull --rebase --autostash && git push); fi
