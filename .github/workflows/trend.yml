name: trend

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: trend
  cancel-in-progress: false

jobs:
  trend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Trend-following multi-actifs (Stooq)
        run: python trend.py
      - name: Committer le rapport
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "rien"; else
            git commit -m "trend $(date -u +%FT%TZ)"
            git pull --rebase --autostash || true
            git push
          fi
