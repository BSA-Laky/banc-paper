name: macro

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: macro
  cancel-in-progress: false

jobs:
  macro:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Macro externe (F&G + stablecoins)
        run: python macro.py
      - name: Committer le rapport
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "rien"; else
            git commit -m "macro $(date -u +%FT%TZ)"
            git pull --rebase --autostash || true
            git push
          fi
